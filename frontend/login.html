<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kirjaudu sisään – Kotitalous</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      width: 100%;
      max-width: 420px;
      margin: 1rem;
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, #1a1a2e, #0f3460);
      color: #fff;
      text-align: center;
      padding: 2rem 1.5rem 1.5rem;
    }
    .card-header h1 { font-size: 1.6rem; margin-bottom: 0.25rem; }
    .card-header p  { font-size: 0.85rem; opacity: 0.7; }

    .tabs {
      display: flex;
      border-bottom: 2px solid #e9ecef;
    }
    .tab {
      flex: 1;
      padding: 0.9rem;
      background: none;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      color: #666;
      cursor: pointer;
      transition: color 0.2s, border-bottom 0.2s;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
    }
    .tab.active { color: #0f3460; border-bottom-color: #0f3460; }

    .card-body { padding: 1.75rem; }

    .form-panel { display: none; }
    .form-panel.active { display: block; }

    .form-group { margin-bottom: 1.1rem; }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 0.4rem;
    }
    input[type=text], input[type=email], input[type=password] {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus { border-color: #0f3460; }

    .btn {
      width: 100%;
      padding: 0.75rem;
      background: linear-gradient(135deg, #1a1a2e, #0f3460);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 0.5rem;
    }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .alert {
      padding: 0.75rem 1rem;
      border-radius: 6px;
      font-size: 0.88rem;
      margin-bottom: 1rem;
      display: none;
    }
    .alert.error   { background: #fce8e8; color: #c0392b; border: 1px solid #f5c6cb; display: block; }
    .alert.success { background: #e8f8e8; color: #27ae60; border: 1px solid #c3e6cb; display: block; }
  </style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <h1>🏠 Kotitalous</h1>
    <p>Kulutusseuranta</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login', event)">Kirjaudu</button>
    <button class="tab"        onclick="switchTab('register', event)">Rekisteröidy</button>
  </div>

  <div class="card-body">
    <div id="alertBox" class="alert"></div>

    <!-- Login form -->
    <div id="loginPanel" class="form-panel active">
      <div class="form-group">
        <label for="loginEmail">Sähköposti</label>
        <input type="email" id="loginEmail" placeholder="nimi@esimerkki.fi" autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="loginPassword">Salasana</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn" id="loginBtn" onclick="handleLogin()">Kirjaudu sisään</button>
      <p style="text-align:center;margin-top:1rem;font-size:0.85rem">
        <a href="/reset-password.html" style="color:#0f3460;text-decoration:none;font-weight:600">Unohditko salasanasi?</a>
      </p>
    </div>

    <!-- Register form -->
    <div id="registerPanel" class="form-panel">
      <div class="form-group">
        <label for="regName">Nimi</label>
        <input type="text" id="regName" placeholder="Matti Meikäläinen" />
      </div>
      <div class="form-group">
        <label for="regEmail">Sähköposti</label>
        <input type="email" id="regEmail" placeholder="nimi@esimerkki.fi" />
      </div>
      <div class="form-group">
        <label for="regPassword">Salasana <small style="color:#888">(min. 8 merkkiä)</small></label>
        <input type="password" id="regPassword" placeholder="••••••••" autocomplete="new-password" />
      </div>
      <button class="btn" id="registerBtn" onclick="handleRegister()">Luo tili</button>
    </div>
  </div>
</div>

<script>
  const API = ''; // same origin

  function switchTab(tab, e) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
    if (e) e.target.classList.add('active');
    document.getElementById(tab + 'Panel').classList.add('active');
    clearAlert();
  }

  function showAlert(msg, type) {
    const box = document.getElementById('alertBox');
    box.textContent = msg;
    box.className = 'alert ' + type;
  }
  function clearAlert() {
    const box = document.getElementById('alertBox');
    box.className = 'alert';
    box.textContent = '';
  }

  function saveToken(token, user) {
    localStorage.setItem('authToken', token);
    localStorage.setItem('authUser', JSON.stringify(user));
  }

  async function handleLogin() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn      = document.getElementById('loginBtn');

    if (!email || !password) { showAlert('Täytä kaikki kentät.', 'error'); return; }

    btn.disabled = true;
    btn.textContent = 'Kirjaudutaan...';
    clearAlert();

    try {
      const res  = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (!res.ok) { showAlert(data.error || 'Kirjautuminen epäonnistui.', 'error'); return; }

      saveToken(data.token, data.user);
      showAlert('Kirjautuminen onnistui! Siirrytään...', 'success');
      setTimeout(() => window.location.href = '/index.html', 800);
    } catch {
      showAlert('Verkkovirhe. Tarkista yhteys.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Kirjaudu sisään';
    }
  }

  async function handleRegister() {
    const name     = document.getElementById('regName').value.trim();
    const email    = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const btn      = document.getElementById('registerBtn');

    if (!name || !email || !password) { showAlert('Täytä kaikki kentät.', 'error'); return; }
    if (password.length < 8)          { showAlert('Salasanan tulee olla vähintään 8 merkkiä.', 'error'); return; }

    btn.disabled = true;
    btn.textContent = 'Luodaan tiliä...';
    clearAlert();

    try {
      const res  = await fetch(`${API}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });
      const data = await res.json();

      if (!res.ok) { showAlert(data.error || 'Rekisteröinti epäonnistui.', 'error'); return; }

      saveToken(data.token, data.user);
      showAlert('Tili luotu! Siirrytään...', 'success');
      setTimeout(() => window.location.href = '/index.html', 800);
    } catch {
      showAlert('Verkkovirhe. Tarkista yhteys.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Luo tili';
    }
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const loginActive = document.getElementById('loginPanel').classList.contains('active');
      loginActive ? handleLogin() : handleRegister();
    }
  });

  // If already logged in, redirect straight to app
  (async function checkExistingSession() {
    const token = localStorage.getItem('authToken');
    if (!token) return;
    try {
      const res = await fetch('/auth/verify', { headers: { Authorization: `Bearer ${token}` } });
      if (res.ok) window.location.href = '/index.html';
    } catch {}
  })();
</script>
</body>
</html>
