<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Palauta salasana – Kotitalous</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      width: 100%;
      max-width: 420px;
      margin: 1rem;
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, #1a1a2e, #0f3460);
      color: #fff;
      text-align: center;
      padding: 2rem 1.5rem 1.5rem;
    }
    .card-header h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .card-header p  { font-size: 0.85rem; opacity: 0.7; }

    .card-body { padding: 1.75rem; }

    .form-group { margin-bottom: 1.1rem; }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 0.4rem;
    }
    label small { font-weight: 400; color: #888; }
    input[type=password], input[type=email] {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #0f3460; }

    .btn {
      width: 100%;
      padding: 0.75rem;
      background: linear-gradient(135deg, #1a1a2e, #0f3460);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 0.5rem;
    }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      width: 100%;
      padding: 0.65rem;
      background: none;
      color: #0f3460;
      border: 1.5px solid #0f3460;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.75rem;
    }
    .btn-secondary:hover { background: #f0f4ff; }

    .alert {
      padding: 0.75rem 1rem;
      border-radius: 6px;
      font-size: 0.88rem;
      margin-bottom: 1rem;
      display: none;
    }
    .alert.error   { background: #fce8e8; color: #c0392b; border: 1px solid #f5c6cb; display: block; }
    .alert.success { background: #e8f8e8; color: #27ae60; border: 1px solid #c3e6cb; display: block; }
    .alert.info    { background: #e8f0fe; color: #1a1a2e; border: 1px solid #c5d5f5; display: block; }

    .back-link {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.85rem;
    }
    .back-link a { color: #0f3460; text-decoration: none; font-weight: 600; }
    .back-link a:hover { text-decoration: underline; }

    /* Request form view */
    #requestView {}
    /* Reset form view (shown when token in URL) */
    #resetView { display: none; }
    /* Success view */
    #successView { display: none; text-align: center; padding: 1rem 0; }
    #successView .success-icon { font-size: 3rem; margin-bottom: 1rem; }
    #successView h2 { color: #1a1a2e; margin-bottom: 0.5rem; }
    #successView p  { color: #555; font-size: 0.9rem; margin-bottom: 1.5rem; }
  </style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <h1>🏠 Kotitalous</h1>
    <p id="headerSubtitle">Salasanan palautus</p>
  </div>

  <div class="card-body">
    <div id="alertBox" class="alert"></div>

    <!-- Step 1: Enter email to request reset -->
    <div id="requestView">
      <p style="font-size:0.9rem;color:#555;margin-bottom:1.25rem">
        Syötä sähköpostiosoitteesi niin lähetämme sinulle palautuslinkin.
      </p>
      <div class="form-group">
        <label for="resetEmail">Sähköposti</label>
        <input type="email" id="resetEmail" placeholder="nimi@esimerkki.fi" autocomplete="email" />
      </div>
      <button class="btn" id="requestBtn" onclick="requestReset()">Lähetä palautuslinkki</button>
      <div class="back-link"><a href="/login.html">← Takaisin kirjautumiseen</a></div>
    </div>

    <!-- Step 2: Enter new password (token from URL) -->
    <div id="resetView">
      <div class="form-group">
        <label for="newPwd">Uusi salasana <small>(min. 8 merkkiä)</small></label>
        <input type="password" id="newPwd" placeholder="••••••••" autocomplete="new-password" />
      </div>
      <div class="form-group">
        <label for="confirmPwd">Vahvista salasana</label>
        <input type="password" id="confirmPwd" placeholder="••••••••" autocomplete="new-password" />
      </div>
      <button class="btn" id="resetBtn" onclick="doReset()">Vaihda salasana</button>
      <div class="back-link"><a href="/login.html">← Takaisin kirjautumiseen</a></div>
    </div>

    <!-- Step 3: Success -->
    <div id="successView">
      <div class="success-icon">✅</div>
      <h2>Salasana vaihdettu!</h2>
      <p>Voit nyt kirjautua sisään uudella salasanallasi.</p>
      <a href="/login.html"><button class="btn">Siirry kirjautumiseen</button></a>
    </div>
  </div>
</div>

<script>
  // Check if token is in URL → show reset form instead of request form
  const params = new URLSearchParams(window.location.search);
  const token  = params.get('token');

  if (token) {
    document.getElementById('requestView').style.display  = 'none';
    document.getElementById('resetView').style.display    = 'block';
    document.getElementById('headerSubtitle').textContent = 'Aseta uusi salasana';
  }

  function showAlert(msg, type) {
    const box = document.getElementById('alertBox');
    box.textContent = msg;
    box.className   = 'alert ' + type;
  }

  // ── Request password reset ──────────────────────────────────────────────────
  async function requestReset() {
    const email = document.getElementById('resetEmail').value.trim();
    const btn   = document.getElementById('requestBtn');
    if (!email) { showAlert('Syötä sähköpostiosoite.', 'error'); return; }

    btn.disabled    = true;
    btn.textContent = 'Lähetetään...';

    try {
      const res  = await fetch('/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();

      if (!res.ok) { showAlert(data.error || 'Virhe.', 'error'); return; }

      if (data.devLink) {
        // Dev mode: email not configured, show link directly
        showAlert(`Sähköposti ei ole käytössä. Kehityslinkkisi: ${data.devLink}`, 'info');
      } else {
        showAlert(data.message, 'success');
      }
    } catch {
      showAlert('Verkkovirhe.', 'error');
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Lähetä palautuslinkki';
    }
  }

  // ── Do actual password reset ────────────────────────────────────────────────
  async function doReset() {
    const password = document.getElementById('newPwd').value;
    const confirm  = document.getElementById('confirmPwd').value;
    const btn      = document.getElementById('resetBtn');

    if (!password || !confirm) { showAlert('Täytä molemmat kentät.', 'error'); return; }
    if (password.length < 8)   { showAlert('Salasanan tulee olla vähintään 8 merkkiä.', 'error'); return; }
    if (password !== confirm)   { showAlert('Salasanat eivät täsmää.', 'error'); return; }

    btn.disabled    = true;
    btn.textContent = 'Vaihdetaan...';

    try {
      const res  = await fetch('/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password })
      });
      const data = await res.json();

      if (!res.ok) { showAlert(data.error || 'Virhe.', 'error'); return; }

      document.getElementById('resetView').style.display   = 'none';
      document.getElementById('successView').style.display = 'block';
      document.getElementById('alertBox').className        = 'alert';
    } catch {
      showAlert('Verkkovirhe.', 'error');
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Vaihda salasana';
    }
  }

  // Allow Enter key
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (token) doReset(); else requestReset();
  });
</script>
</body>
</html>
